name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          jsonschema==4.26.0
          ruff==0.15.19
      - name: Compile pipeline
        run: python -m compileall -q catalog_pipeline tests
      - name: Lint Python
        run: ruff check .
      - name: Check Python formatting
        run: ruff format --check .
      - name: Test provider policies and normalization
        run: python -m unittest discover -s tests -v
      - name: Verify generated artifacts
        run: >-
          python -m catalog_pipeline.generate
          --observations-dir fixtures
          --output-dir fixtures/expected
          --check
      - name: Exercise guarded bootstrap classification
        run: >-
          python -m catalog_pipeline.promotion
          --candidate-dir fixtures/expected
          --output-dir /tmp/promotion-review
      - name: Rebuild and verify reviewed bootstrap
        run: |
          python -m catalog_pipeline.bootstrap --output-dir /tmp/bootstrap-candidate
          python -m catalog_pipeline.verify_release --directory /tmp/bootstrap-candidate
      - name: Verify stable release state
        run: python -m catalog_pipeline.verify_release --directory stable --stable
