name: Observe provider catalog

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: provider-catalog-observation
  cancel-in-progress: false

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.11"
      - name: Fetch official provider model lists
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: >-
          python -m catalog_pipeline.fetch
          --provider all
          --output-dir observations
      - name: Generate centralized candidate
        run: >-
          python -m catalog_pipeline.generate
          --observations-dir observations
          --output-dir candidate
      - name: Retain observations and candidate
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: provider-catalog-candidate-${{ github.run_id }}
          path: |
            observations/
            candidate/
          if-no-files-found: warn
          retention-days: 14
