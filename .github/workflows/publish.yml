name: Publish stable catalog

on:
  push:
    branches:
      - main
    paths:
      - "stable/**"

permissions:
  contents: write
  issues: write

concurrency:
  group: provider-catalog-publication
  cancel-in-progress: false

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.11"
      - name: Install validation dependency
        run: >-
          python -m pip install --disable-pip-version-check
          jsonschema==4.26.0
      - name: Verify repository and stable state
        run: |
          python -m compileall -q catalog_pipeline tests
          python -m unittest discover -s tests -v
          python -m catalog_pipeline.verify_release --directory stable --stable
      - name: Resolve immutable release identity
        id: release
        run: |
          release_id=$(python -c 'import json; print(json.load(open("stable/manifest-v1.json"))["release_id"])')
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
      - name: Resolve resumable publication state
        id: publication
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          if gh release view "$RELEASE_ID" >/dev/null 2>&1; then
            target=$(gh release view "$RELEASE_ID" --json targetCommitish --jq .targetCommitish)
            if [ "$target" != "$GITHUB_SHA" ]; then
              echo "existing release targets $target, not $GITHUB_SHA" >&2
              exit 1
            fi
            state=$(gh release view "$RELEASE_ID" --json isDraft --jq 'if .isDraft then "draft" else "published" end')
          else
            if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_ID"; then
              echo "tag exists without its expected release: $RELEASE_ID" >&2
              exit 1
            fi
            state=missing
          fi
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        if: steps.publication.outputs.state == 'missing'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: >-
          gh release create "$RELEASE_ID"
          --draft
          --target "$GITHUB_SHA"
          --title "$RELEASE_ID"
          --notes "Verified Euler provider and model metadata."
      - name: Upload exact runtime assets to draft
        if: steps.publication.outputs.state != 'published'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: >-
          gh release upload "$RELEASE_ID"
          stable/catalog-v1.json
          stable/manifest-v1.json
          stable/provenance-v1.json
          --clobber
      - name: Download and verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          mkdir -p /tmp/release-assets
          gh release download "$RELEASE_ID" --dir /tmp/release-assets
          python -m catalog_pipeline.verify_release --directory /tmp/release-assets
          cmp stable/catalog-v1.json /tmp/release-assets/catalog-v1.json
          cmp stable/manifest-v1.json /tmp/release-assets/manifest-v1.json
          cmp stable/provenance-v1.json /tmp/release-assets/provenance-v1.json
      - name: Publish immutable release
        if: steps.publication.outputs.state != 'published'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: gh release edit "$RELEASE_ID" --draft=false --latest
      - name: Close the promotion notice
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          issue_number=$(gh issue list --state open --limit 100 --json number,title \
            --jq 'map(select(.title == "Provider catalog update ready"))[0].number // empty')
          if [ -n "$issue_number" ]; then
            gh issue close "$issue_number" \
              --comment "Published immutable release \`$RELEASE_ID\`."
          fi
