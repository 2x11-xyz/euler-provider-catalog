name: Prepare catalog promotion

on:
  workflow_run:
    workflows:
      - Observe provider catalog
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: read
  actions: write

concurrency:
  group: provider-catalog-promotion
  cancel-in-progress: false

jobs:
  promote:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == github.event.repository.default_branch &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the observed main revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.11"
      - name: Download the successful observation candidate
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: provider-catalog-candidate-${{ github.event.workflow_run.id }}
          path: /tmp/provider-catalog-observation
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Prepare guarded stable state
        id: promotion
        run: |
          set +e
          python -m catalog_pipeline.prepare_stable \
            --candidate-dir /tmp/provider-catalog-observation/candidate \
            --previous-dir stable \
            --output-dir /tmp/provider-catalog-stable
          status=$?
          set -e
          # Exit 3 is intentionally distinct from argparse's usage-error exit 2.
          if [ "$status" -eq 3 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          cp /tmp/provider-catalog-stable/*.json stable/
          release_id=$(python -c 'import json; print(json.load(open("stable/manifest-v1.json"))["release_id"])')
          decision=$(python -c 'import json; print(json.load(open("stable/diff-v1.json"))["decision"])')
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "decision=$decision" >> "$GITHUB_OUTPUT"
      - name: Install validation dependencies
        if: steps.promotion.outputs.changed == 'true'
        run: >-
          python -m pip install --disable-pip-version-check
          jsonschema==4.26.0
          ruff==0.15.19
      - name: Validate the proposed stable state
        if: steps.promotion.outputs.changed == 'true'
        run: |
          python -m compileall -q catalog_pipeline tests
          ruff check .
          ruff format --check .
          python -m unittest discover -s tests -v
          python -m catalog_pipeline.verify_release --directory stable --stable
      - name: Update the single promotion branch
        if: steps.promotion.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.promotion.outputs.release_id }}
          DECISION: ${{ steps.promotion.outputs.decision }}
          OBSERVATION_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          branch=automation/provider-catalog-update
          git config user.name "euler-provider-catalog[bot]"
          git config user.email "euler-provider-catalog[bot]@users.noreply.github.com"
          if git fetch origin "+refs/heads/$branch:refs/remotes/origin/$branch"; then
            branch_exists=true
            previous=$(git rev-parse "refs/remotes/origin/$branch")
            lease="--force-with-lease=refs/heads/$branch:$previous"
          else
            branch_exists=false
            lease="--force-with-lease=refs/heads/$branch:"
          fi
          if [ "$branch_exists" = "true" ]; then
            mkdir -p /tmp/provider-catalog-pending
            git archive "refs/remotes/origin/$branch" stable \
              | tar -x -C /tmp/provider-catalog-pending
            order=$(python -m catalog_pipeline.release_order \
              --candidate-dir stable \
              --baseline-dir /tmp/provider-catalog-pending/stable)
            if [ "$order" != "newer" ]; then
              echo "leaving newer or identical pending release unchanged ($order)"
              exit 0
            fi
          fi

          git checkout -B "$branch"
          git add stable
          if git diff --cached --quiet; then
            echo "prepared stable state is already committed"
            exit 0
          fi
          git commit -m "Update stable provider catalog to $RELEASE_ID"
          git push "$lease" origin "HEAD:refs/heads/$branch"

          # A repository-level organization policy prevents GITHUB_TOKEN from
          # creating pull requests. Validate the exact branch commit and leave
          # one actionable issue instead of introducing a long-lived bot token.
          gh workflow run ci.yml --ref "$branch"

          body=$(printf '%s\n\n%s\n\n%s\n\n%s' \
            "Daily official-source observation prepared release \`$RELEASE_ID\`." \
            "Promotion decision: **$DECISION**. The checked-in diff remains the review authority." \
            "Open the promotion PR: https://github.com/$GITHUB_REPOSITORY/compare/main...automation%2Fprovider-catalog-update?expand=1" \
            "Observation evidence: $OBSERVATION_RUN_URL")
          pr_number=$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')
          if [ -z "$pr_number" ]; then
            issue_number=$(gh issue list --state open --limit 100 --json number,title \
              --jq 'map(select(.title == "Provider catalog update ready"))[0].number // empty')
            if [ -z "$issue_number" ]; then
              gh issue create --title "Provider catalog update ready" --body "$body"
            else
              gh issue edit "$issue_number" --body "$body"
            fi
          else
            echo "updated existing promotion PR #$pr_number"
          fi
